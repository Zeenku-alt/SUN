<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Beamer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Stars */
.stars{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:#fff;
    border-radius:50%;
    animation:move linear infinite alternate;
}

@keyframes move{
    from{
        transform:translateX(-40px);
    }
    to{
        transform:translateX(40px);
    }
}

.popup{
    width:90%;
    max-width:470px;
    background:rgba(18,18,18,.85);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:20px;
    padding:30px;
    color:white;
    text-align:center;
    box-shadow:0 0 40px rgba(255,255,255,.08);
    animation:popup .6s ease;
}

@keyframes popup{
    from{
        opacity:0;
        transform:scale(.85);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

h1{
    font-size:27px;
    margin-bottom:18px;
}

p{
    color:#cfcfcf;
    line-height:1.7;
    margin-bottom:28px;
}

.buttons{
    display:flex;
    gap:15px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:17px;
    cursor:pointer;
    transition:.25s;
}

.no{
    background:#2d2d2d;
    color:white;
}

.no:hover{
    background:#444;
}

.yes{
    background:#5865F2;
    color:white;
}

.yes:hover{
    background:#4752C4;
}

#message{
    display:none;
    color:white;
    font-size:26px;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="popup" id="popup">

<h1>Hello Beamers 👋</h1>

<p>
Hello Beamers,

Sadly, our Vercel link was attacked by a hacker.

I created a new one that is just like our old server. I hope you'll join our new Discord beam server!

Would you like to join?
</p>

<div class="buttons">

<button class="no" onclick="noBtn()">
❌ No
</button>

<button class="yes" onclick="yesBtn()">
✅ Yes
</button>

</div>

</div>

<div id="message"></div>

<script>
// Stars
const stars=document.querySelector(".stars");

for(let i=0;i<250;i++){

const s=document.createElement("div");

s.className="star";

const size=Math.random()*3+1;

s.style.width=size+"px";
s.style.height=size+"px";

s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";

s.style.opacity=Math.random();

s.style.animationDuration=(2+Math.random()*6)+"s";

stars.appendChild(s);

}

function noBtn(){

document.getElementById("popup").style.display="none";

const msg=document.getElementById("message");

msg.style.display="block";

msg.innerHTML="✅ Okay!";

setTimeout(()=>{
window.location.href="https://sun-moon-beam.vercel.app/";
},3000);

}

function yesBtn(){

document.getElementById("popup").style.display="none";

const msg=document.getElementById("message");

msg.style.display="block";

msg.innerHTML="✅ Okay!<br><br>Redirecting to Discord Server...";

setTimeout(()=>{
window.location.href="https://dsc.gg/moonsunbeam";
},3000);

}
</script>

</body>
</html>
